# Offers the agent can buy. Each offer = a SELLER selling a MODEL at a price.
# Multiple sellers may offer the SAME model (aa_slug) — open models are resold by
# anyone, so selection compares SELLERS (price + reputation), not just models.
# Candidates = offers whose aa_slug has a benchmark score.
#
# All LLM inference is x402-paid to OUR proxy (testnet); `backend` = who fulfills it.
# `seller_id` is the reputation key (per-seller history).

offers:
  # --- Llama 3.3: THREE competing sellers (same model, different price) ---
  - aa_slug: llama-3.3-70b
    seller_id: alpha                   # priciest but FASTEST GPU
    seller: proxy
    seller_url: http://localhost:8402/inference
    backend: heurist
    model_id: meta-llama/llama-3.3-70b-instruct
    price_usdc_per_call: 0.0020
    speed_tps: 90

  - aa_slug: llama-3.3-70b
    seller_id: beta                    # mid price, mid speed
    seller: proxy
    seller_url: http://localhost:8402/inference
    backend: heurist
    model_id: meta-llama/llama-3.3-70b-instruct
    price_usdc_per_call: 0.0015
    speed_tps: 60

  - aa_slug: llama-3.3-70b
    seller_id: gamma                   # cheapest but SLOWEST (price↔speed tradeoff)
    seller: proxy
    seller_url: http://localhost:8402/inference
    backend: heurist
    model_id: meta-llama/llama-3.3-70b-instruct
    price_usdc_per_call: 0.0012
    speed_tps: 35

  # --- DeepSeek: two sellers ---
  - aa_slug: deepseek-v3
    seller_id: delta
    seller: proxy
    seller_url: http://localhost:8402/inference
    backend: heurist
    model_id: deepseek/deepseek-v3
    price_usdc_per_call: 0.0030

  - aa_slug: deepseek-v3
    seller_id: epsilon
    seller: proxy
    seller_url: http://localhost:8402/inference
    backend: heurist
    model_id: deepseek/deepseek-v3
    price_usdc_per_call: 0.0025

  # --- Qwen: one seller ---
  - aa_slug: qwen-2.5-72b
    seller_id: zeta
    seller: proxy
    seller_url: http://localhost:8402/inference
    backend: heurist
    model_id: qwen/qwen-2.5-72b-instruct
    price_usdc_per_call: 0.0020

  # --- Frontier: single storefront each (closed model, one producer) ---
  - aa_slug: gpt-4o
    seller_id: openai-store
    seller: proxy
    seller_url: http://localhost:8402/inference
    backend: openai
    model_id: gpt-4o
    price_usdc_per_call: 0.020

  - aa_slug: claude-opus-4-8
    seller_id: anthropic-store
    seller: proxy
    seller_url: http://localhost:8402/inference
    backend: anthropic
    model_id: claude-opus-4-8
    price_usdc_per_call: 0.025

  - aa_slug: gemini-2.0-flash
    seller_id: google-store
    seller: proxy
    seller_url: http://localhost:8402/inference
    backend: gemini
    model_id: gemini-2.0-flash          # Gemini via OpenAI-compat; verify id at aistudio.google.com
    price_usdc_per_call: 0.005
    speed_tps: 230

# Priority label -> weight vector over selection metrics.
# Metrics: intelligence, coding, agentic (higher=better),
#          cheap (lower OFFER price=better), fast (higher tps=better).
priority_presets:
  intelligence: {intelligence: 1.0}
  coding:       {coding: 1.0}
  agentic:      {agentic: 1.0}
  cheap:        {cheap: 1.0}
  fast:         {fast: 1.0}
  balanced:     {intelligence: 0.4, coding: 0.3, cheap: 0.2, fast: 0.1}
